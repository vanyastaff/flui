[package]
name = "flui-hot-reload"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Hot-reload support for FLUI scene plugins via dynamic library loading"

[dependencies]
flui-layer = { path = "../flui-layer" }
flui-view = { path = "../flui-view" }
flui-rendering = { path = "../flui-rendering" }
flui-types = { path = "../flui-types" }
parking_lot = { workspace = true }
tracing = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_System_LibraryLoader",
] }

[lints]
workspace = true
