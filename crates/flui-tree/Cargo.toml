[package]
name = "flui-tree"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Tree abstraction traits for FLUI framework - enables separation of concerns between element management and rendering"
documentation = "https://docs.rs/flui-tree"
keywords = ["ui", "gui", "tree", "flui", "framework"]
categories = ["gui", "data-structures"]

[dependencies]
# Internal dependencies
flui-foundation = { path = "../flui-foundation", version = "0.2.0" }

# Core dependencies
thiserror = { workspace = true }
tracing = { workspace = true }
smallvec = { workspace = true }

# Typed builders (eliminates confusable positional args, F14)
bon = { workspace = true }

[dev-dependencies]

[features]
default = []

# Serialization support for tree types — no direct serde derives in this crate;
# forwards to flui-foundation/serde so foundation types get Serialize/Deserialize.
serde = ["flui-foundation/serde"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true
