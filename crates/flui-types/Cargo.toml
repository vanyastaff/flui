[package]
name = "flui-types"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Core types for Flui framework - geometry, layout, styling"
repository.workspace = true

[dependencies]
tracing = { workspace = true }

# Geometry primitives — split out into its own Layer-0 crate in D-block
# PR-C-2 (U7 bridge). flui-types re-exports `pub use flui_geometry as geometry`
# so existing `flui_types::geometry::*` consumers continue to compile.
flui-geometry = { path = "../flui-geometry" }

# Numeric traits for generic math (Float, Num, etc.)
num-traits = "0.2"

# Error handling
thiserror = "2.0"

# Serialization support (optional)
serde = { workspace = true, optional = true }

# Stack-allocated Vec for small collections (animation curves, color stops)
smallvec = { workspace = true }

# Note: mint and glam optional deps were dropped in D-block PR-C-2 (U6+U7);
# the mint/glam interop now lives in flui-geometry. flui-types still exposes
# `mint` and `glam` feature flags but they FORWARD to flui-geometry/{mint,glam}
# (see [features] below) — no direct flui-types code uses those crates after
# the geometry split.

[dev-dependencies]
criterion = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
proptest = "1.5"
trybuild = "1.0"

[features]
default = []

# === Serialization ===
# Serde support for all types (Color, Size, Rect, etc.)
# Forwards to flui-geometry/serde so flui_types::geometry::* (re-exported
# from flui-geometry) gets Serialize/Deserialize impls. Without the forward,
# enabling flui-types/serde would silently leave geometry types non-serde-able
# post-split — a compat regression (Codex P1, PR #138).
serde = ["dep:serde", "flui-geometry/serde"]

# === Performance ===
# SIMD acceleration for math operations
# Auto-detects SSE/AVX (x86_64) or NEON (ARM). Locally gates flui-types own
# color.rs SIMD code paths AND forwards to flui-geometry/simd for the
# Matrix4 SSE/NEON multiplication fast paths.
simd = ["flui-geometry/simd"]

# === Interoperability ===
# mint: Zero-cost conversions with glam, nalgebra, cgmath, kurbo.
# Forwarded to flui-geometry/mint (impls live in flui-geometry post-split).
mint = ["flui-geometry/mint"]

# glam: Direct integration with glam math library.
# Forwarded to flui-geometry/glam (impls live in flui-geometry post-split).
glam = ["flui-geometry/glam"]

# === Convenience ===
# Enable all features
full = ["serde", "simd", "mint", "glam"]

# NOTE: Image and font loading moved to flui-assets crate.
# flui_types only provides type definitions!

[[bench]]
name = "geometry_bench"
harness = false

[[bench]]
name = "color_bench"
harness = false

[[bench]]
name = "conversions_bench"
harness = false

[lints.rust]
unsafe_code = "warn"
rust_2018_idioms = "warn"

[lints.clippy]
# Inherit workspace-like base
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
# Workspace-level allows
cast_precision_loss = "allow"
module_name_repetitions = "allow"
too_many_lines = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
# Math/geometry crate specifics
many_single_char_names = "allow"
cast_possible_truncation = "allow"
cast_sign_loss = "allow"
cast_lossless = "allow"
similar_names = "allow"
# Doc lints — will address incrementally
doc_markdown = "allow"
# Geometry code often passes small Copy types by ref for API consistency
needless_pass_by_value = "allow"
trivially_copy_pass_by_ref = "allow"
# Builder-pattern methods returning Self are pervasive
return_self_not_must_use = "allow"
# Float comparisons are intentional in geometry/physics (tolerance-checked elsewhere)
float_cmp = "allow"
# Wildcard imports used in preludes
wildcard_imports = "allow"
