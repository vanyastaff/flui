[package]
name = "flui-types"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Core types for Flui framework - geometry, layout, styling"
repository.workspace = true
# Single-binary integration-test consolidation: every root test file is a
# module of `tests/main.rs` (one link of the full dep stack instead of 16
# separate binaries). See the `[[test]] name = "types_it"` target below.
autotests = false

[dependencies]
# Geometry primitives — split out into its own Layer-0 crate in D-block
# PR-C-2 (U7 bridge). flui-types re-exports `pub use flui_geometry as geometry`
# so existing `flui_types::geometry::*` consumers continue to compile.
flui-geometry = { path = "../flui-geometry", version = "0.2.0" }

# Serialization support (optional).
# `rc` enables `Serialize`/`Deserialize` for `Arc<T>` — needed by
# `InlineSpan::Text(Arc<TextSpan>)`. Deserialization does not preserve Arc
# sharing (each is rebuilt independently), which is fine: display-list
# snapshots carry no cross-span aliasing to preserve.
serde = { workspace = true, optional = true, features = ["rc"] }

# Stack-allocated Vec for small collections (animation curves, color stops)
smallvec = { workspace = true }

# Note: mint and glam optional deps were dropped in D-block PR-C-2 (U6+U7);
# the mint/glam interop now lives in flui-geometry. flui-types still exposes
# `mint` and `glam` feature flags but they FORWARD to flui-geometry/{mint,glam}
# (see [features] below) — no direct flui-types code uses those crates after
# the geometry split.

[dev-dependencies]
criterion = { workspace = true }
# Property-based tests in tests/geometry_property_tests.rs
proptest = "1.5"
trybuild = "1.0"

[features]
default = []

# === Serialization ===
# Serde support for all types (Color, Size, Rect, etc.)
# Forwards to flui-geometry/serde so flui_types::geometry::* (re-exported
# from flui-geometry) gets Serialize/Deserialize impls. Without the forward,
# enabling flui-types/serde would silently leave geometry types non-serde-able
# post-split — a compat regression (Codex P1, PR #138).
serde = ["dep:serde", "flui-geometry/serde"]

# === Performance ===
# SIMD acceleration for flui-types' own color.rs SSE/NEON code paths.
# (flui-geometry's matrix/vector SIMD now comes from glam, always-on — there is
# no longer a flui-geometry `simd` feature to forward to. N-geom PR 2, Option D.)
simd = []

# === Interoperability ===
# mint: Zero-cost conversions with glam, nalgebra, cgmath, kurbo.
# Forwarded to flui-geometry/mint (impls live in flui-geometry post-split).
mint = ["flui-geometry/mint"]

# === Convenience ===
# Enable all features
full = ["serde", "simd", "mint"]

# NOTE: Image and font loading moved to flui-assets crate.
# flui_types only provides type definitions!

# Consolidated integration-test binary (see `autotests = false` above).
# Includes the trybuild compile-fail suite (`unit_mixing_compile_fail.rs`
# driving `tests/compile_fail/*.rs`) — trybuild resolves fixtures via
# CARGO_MANIFEST_DIR, so it is safe inside the consolidated target. No
# test file writes process-global state, so no isolated [[test]] targets
# are needed.
[[test]]
name = "types_it"
path = "tests/main.rs"

[[bench]]
name = "geometry_bench"
harness = false

[[bench]]
name = "color_bench"
harness = false

[[bench]]
name = "conversions_bench"
harness = false

[lints]
workspace = true

[package.metadata.cargo-shear]
ignored-paths = ["tests/compile_fail/*.rs"]
