[package]
name = "flui-widgets"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "User-facing Flutter-style widget catalog for FLUI (configuration objects over the flui-objects render catalog)"
repository.workspace = true
readme = "README.md"
keywords = ["ui", "widget", "flutter", "flui", "gui"]
categories = ["gui"]
# Root tests/*.rs are consolidated into the single `widgets_it` binary below
# (one link of the wgpu stack instead of 49) — disable per-file auto-discovery.
autotests = false

[dependencies]
# Authoring spine: View/Element traits, BuildContext, ViewSeq, keys, derives
# (also transitively re-exports flui-foundation's ElementId/RenderId).
flui-view = { path = "../flui-view", version = "0.2.0" }
# Concrete RenderBox catalog every render-object widget wraps (also re-exports
# the flex/stack config enums it owns from flui-types).
flui-objects = { path = "../flui-objects", version = "0.2.0" }
# Protocol + RenderObject traits + BoxConstraints referenced by `RenderView`.
flui-rendering = { path = "../flui-rendering", version = "0.2.0" }
# Animation primitives (`Animation<T>`) for transition widgets (`FadeTransition`).
flui-animation = { path = "../flui-animation", version = "0.2.0" }
# `Listenable` — the subscription `AnimatedView`/`FadeTransition` returns.
flui-foundation = { path = "../flui-foundation", version = "0.2.0" }
# Gesture recognizers + arena that `GestureDetector` drives.
flui-interaction = { path = "../flui-interaction", version = "0.2.0" }
# Styling + typography + layout value types (Alignment, Color, BoxDecoration,
# TextStyle, …).
flui-types = { path = "../flui-types", version = "0.2.0" }
# Geometry primitives (EdgeInsets, Matrix4, Pixels, px).
flui-geometry = { path = "../flui-geometry", version = "0.2.0" }
# Typed error variants for `ImageProviderError` via `#[derive(Error)]`.
thiserror = { workspace = true }
# Structured diagnostics for image-provider failures — `tracing::warn!` on
# provider errors so silent empty-box failures are visible in traces.
tracing = { workspace = true }
# Image decoding (PNG, JPEG, GIF, …). Optional: gate behind the `images`
# feature to avoid pulling in the decode library for apps that only use
# `Image::from_image` (pre-decoded `PixelImage`).
image = { workspace = true, optional = true }

[dev-dependencies]
# Integration tests drive the real layout pipeline through the render harness.
flui-foundation = { path = "../flui-foundation", version = "0.2.0" }
flui-rendering = { path = "../flui-rendering", version = "0.2.0", features = ["testing"] }
flui-objects = { path = "../flui-objects", version = "0.2.0", features = ["testing"] }
flui-types = { path = "../flui-types", version = "0.2.0" }
# Drives a real `AnimationController` in the `FadeTransition` integration test.
flui-scheduler = { path = "../flui-scheduler", version = "0.2.0" }
# Constructs `PointerEvent`s (make_down_event, behind the `testing` feature) for
# the `Listener` dispatch test.
flui-interaction = { path = "../flui-interaction", version = "0.2.0", features = ["testing"] }
# Headless frame driver: provides the shared clock-bound arena a `GestureArenaScope`
# hands to detectors, and `pump_frame` to poll deadline-driven gestures in tests.
flui-binding = { path = "../flui-binding", version = "0.2.0" }
# Shared Arc<RwLock<PipelineOwner>> in the headless layout harness.
parking_lot = { workspace = true }
# Deterministic paint/layout snapshot assertions.
insta = { workspace = true }

# All root tests/*.rs files, consolidated into one binary via `#[path]` module
# declarations in tests/main.rs (autotests = false above disables the per-file
# auto-discovered binaries that each linked the whole wgpu stack).
[[test]]
name = "widgets_it"
path = "tests/main.rs"
harness = true

# The parity test suite lives in a subdirectory so `mod harness; mod *_test;`
# work via Cargo's single-binary test model. Auto-discovery misses subdirectory
# main files, so the target is declared explicitly.
[[test]]
name = "parity"
path = "tests/parity/main.rs"

[features]
default = []
# Activates the `image` crate for decoding PNG/JPEG/GIF/… from bytes or files.
# Required by `MemoryImage` and `FileImage`; `DirectImageProvider` compiles
# without it.
images = ["dep:image"]
# Exposes the HTTP/HTTPS image-provider placeholder while async image loading is
# still being wired through the view layer. Off by default so stable builds do
# not advertise a constructor that always resolves to `AsyncNotWired`.
network-images = []
serde = ["flui-types/serde"]

[lints]
workspace = true
