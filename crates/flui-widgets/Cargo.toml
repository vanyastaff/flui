[package]
name = "flui-widgets"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "User-facing Flutter-style widget catalog for FLUI (configuration objects over the flui-objects render catalog)"
repository.workspace = true
readme = "README.md"
keywords = ["ui", "widget", "flutter", "flui", "gui"]
categories = ["gui"]

[dependencies]
# Authoring spine: View/Element traits, BuildContext, ViewSeq, keys, derives
# (also transitively re-exports flui-foundation's ElementId/RenderId).
flui-view = { path = "../flui-view", version = "0.2.0" }
# Re-exported as `flui_widgets::Stream` so a `StreamBuilder` consumer can name the
# trait without depending on futures-core directly. Trait-only: no
# executor, no combinators, no proc macros.
futures-core = { workspace = true }
# Concrete RenderBox catalog every render-object widget wraps (also re-exports
# the flex/stack config enums it owns from flui-types).
flui-objects = { path = "../flui-objects", version = "0.2.0" }
# Protocol + RenderObject traits + BoxConstraints referenced by `RenderView`.
flui-rendering = { path = "../flui-rendering", version = "0.2.0" }
# Animation primitives (`Animation<T>`) for transition widgets (`FadeTransition`).
flui-animation = { path = "../flui-animation", version = "0.2.0" }
# `NavigatorState::init_state` stores a `PostFrameHandle` so a
# `HeroController` can schedule its measurement. No cycle: flui-view already
# depends on flui-scheduler.
flui-scheduler = { path = "../flui-scheduler", version = "0.2.0" }
# `Listenable` â€” the subscription `AnimatedView`/`FadeTransition` returns.
flui-foundation = { path = "../flui-foundation", version = "0.2.0" }
# `WidgetStates` â€” the interactive-state bitset `WidgetStateProperty`/
# `WidgetStatesController` are built on. Already a workspace dependency
# (flui-rendering's dirty-flag storage); same house style for a small,
# closed set of boolean flags.
bitflags = { workspace = true }
# Gesture recognizers + arena that `GestureDetector` drives.
flui-interaction = { path = "../flui-interaction", version = "0.2.0" }
# Styling + typography + layout value types (Alignment, Color, BoxDecoration,
# TextStyle, â€¦).
flui-types = { path = "../flui-types", version = "0.2.0" }
# Geometry primitives (EdgeInsets, Matrix4, Pixels, px).
flui-geometry = { path = "../flui-geometry", version = "0.2.0" }
# `Overlay`'s entry list and its published `RebuildHandle` live behind private
# `Mutex`es: the list is mutated from outside the tree, and
# `ViewState::build` takes `&self`.
parking_lot = { workspace = true }
# Typed error variants for `ImageProviderError` via `#[derive(Error)]`.
thiserror = { workspace = true }
# Structured diagnostics for image-provider failures â€” `tracing::warn!` on
# provider errors so silent empty-box failures are visible in traces.
tracing = { workspace = true }
# Image decoding (PNG, JPEG, GIF, â€¦). Optional: gate behind the `images`
# feature to avoid pulling in the decode library for apps that only use
# `Image::from_image` (pre-decoded `PixelImage`).
image = { workspace = true, optional = true }
# Byte-loading/decode + a background tokio runtime for `AssetImage`/
# `NetworkImage`'s async resolution (`ImageProvider::resolve_async`).
# Optional: only the `asset-images`/`network-images` features pull it in.
flui-assets = { path = "../flui-assets", version = "0.2.0", optional = true }
# In-flight image-load coalescing (`image::decode_cache`): `Shared` lets two
# `Image` widgets mounted with the same provider key await ONE load. `alloc`
# only â€” no executor, no I/O, no proc-macros (see the workspace-level comment
# on why this is the one place the `futures-core`-only policy isn't enough).
futures-util = { workspace = true, optional = true }
# Count-bounded LRU backing the same decode cache â€” no time-based eviction,
# unlike `flui-assets`' own moka byte-loader cache. See
# `crate::image::decode_cache`'s module doc.
lru = { workspace = true, optional = true }

[dev-dependencies]
# Integration tests drive the real layout pipeline through the render harness.
flui-foundation = { path = "../flui-foundation", version = "0.2.0" }
flui-rendering = { path = "../flui-rendering", version = "0.2.0", features = ["testing"] }
flui-objects = { path = "../flui-objects", version = "0.2.0", features = ["testing"] }
flui-types = { path = "../flui-types", version = "0.2.0" }
# Drives a real `AnimationController` in the `FadeTransition` integration test.
flui-scheduler = { path = "../flui-scheduler", version = "0.2.0" }
# Constructs `PointerEvent`s (make_down_event, behind the `testing` feature) for
# the `Listener` dispatch test.
flui-interaction = { path = "../flui-interaction", version = "0.2.0", features = ["testing"] }
# Headless frame driver: provides the shared clock-bound arena a `GestureArenaScope`
# hands to detectors, and `pump_frame` to poll deadline-driven gestures in tests.
flui-binding = { path = "../flui-binding", version = "0.2.0" }
# Shared Arc<RwLock<PipelineOwner>> in the headless layout harness.
parking_lot = { workspace = true }
# Deterministic paint/layout snapshot assertions.
insta = { workspace = true }
# Compile-time ownership-boundary assertions for ADR-0027.
static_assertions = { workspace = true }
# `#[tokio::test]` for the `image::decode_cache` coalescing unit tests
# (`asset-images` feature) and the async `Image` widget integration tests.
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

# The parity test suite lives in a subdirectory so `mod harness; mod *_test;`
# work via Cargo's single-binary test model. Auto-discovery misses subdirectory
# main files, so the target is declared explicitly.
[[test]]
name = "parity"
path = "tests/parity/main.rs"

[features]
default = []
# Activates the `image` crate for decoding PNG/JPEG/GIF/â€¦ from bytes or files.
# Required by `MemoryImage` and `FileImage`; `DirectImageProvider` compiles
# without it.
images = ["dep:image"]
# Async, `flui-assets`-backed asset-file image loading: `AssetImage` resolves
# through an injected `Arc<flui_assets::AssetRegistry>` on a background tokio
# runtime, decoded via the same `image` crate `images` activates. Pulls in
# `flui-assets` (with its own `images` feature), plus `futures-util`/`lru` for
# the decode cache and load-coalescing engine (`image::decode_cache`).
asset-images = ["dep:flui-assets", "flui-assets/images", "images", "dep:futures-util", "dep:lru"]
# Async network image loading: rewires `NetworkImage::resolve_async` through
# `flui-assets`' `NetworkLoader` (reqwest). Implies `asset-images` â€” both
# share the same decode cache, coalescing engine, and background runtime.
network-images = ["asset-images", "flui-assets/network"]
serde = ["flui-types/serde"]

[lints]
workspace = true
