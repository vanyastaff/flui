[package]
name = "flui-app"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Application framework for FLUI - Flutter-inspired UI"

[lib]
crate-type = ["rlib"]

[features]
default = ["desktop"]

# === Platform Features ===
desktop = []
android = []
ios = []
web = []
winit-backend = ["winit", "ui-events-winit"]

# === Debug Features ===
debug-overlay = []
performance-overlay = []

[dependencies]
# Core FLUI crates
flui-view = { path = "../flui-view" }
flui-rendering = { path = "../flui-rendering" }
flui-types = { path = "../flui-types" }
flui-foundation = { path = "../flui-foundation" }
flui-interaction = { path = "../flui-interaction" }
flui-scheduler = { path = "../flui-scheduler" }
flui-painting = { path = "../flui-painting" }
flui-layer = { path = "../flui-layer" }
flui-semantics = { path = "../flui-semantics" }
flui-engine = { path = "../flui-engine" }
flui-log = { path = "../flui-log" }
flui-platform = { path = "../flui-platform" }
flui-hot-reload = { path = "../flui-hot-reload" }

# Windowing (legacy winit backend, optional)
winit = { workspace = true, optional = true }
ui-events-winit = { workspace = true, optional = true }

# Utilities
tracing.workspace = true
parking_lot.workspace = true
thiserror.workspace = true
anyhow.workspace = true
raw-window-handle.workspace = true
pollster = "0.4"
web-time = "1.1"

# Web/WASM platform
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"

# Android platform (android_main entry point needs AndroidApp type)
[target.'cfg(target_os = "android")'.dependencies]
android-activity = { version = "0.6", features = ["native-activity"] }

[dev-dependencies]
