[package]
name = "flui-view"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "View traits and abstractions for FLUI framework"
repository.workspace = true
keywords = ["ui", "view", "widget", "flui", "framework"]
categories = ["gui"]

[dependencies]
flui-foundation = { path = "../flui-foundation" }
flui-macros = { workspace = true }
flui-tree = { path = "../flui-tree" }
flui-types = { path = "../flui-types" }
flui-rendering = { path = "../flui-rendering" }
flui-interaction = { path = "../flui-interaction" }
flui-log = { path = "../flui-log" }

# Core dependencies
bitflags.workspace = true
parking_lot.workspace = true
slab = "0.4"
thiserror.workspace = true
tracing.workspace = true

# Trait utilities
downcast-rs = "2.0"
dyn-clone = "1.0"

[dev-dependencies]
criterion = { workspace = true }

[features]
default = []
# Enable test utilities like MockBuildContext
test-utils = []

# `legacy-downcast` is workspace-internal ONLY — see Phase 1 §U8 and
# docs/PORT.md. It gates the pre-FR-021 `downcast_ref::<V>()` body
# inside `ElementCore::update_view` so the Phase 0 §U2 S1 bench can
# A/B against the legacy storage shape. Default builds use the new
# identity-shim dispatch path; enabling this feature WITHOUT the
# internal cfg `__flui_legacy_downcast_internal` emits a
# `compile_error!`. Phase 3 §U27 removes both gates entirely.
legacy-downcast = []

[[bench]]
name = "reconcile_baseline"
harness = false

[[bench]]
name = "s1_key_storage"
harness = false

[[bench]]
name = "s2_static_path"
harness = false
