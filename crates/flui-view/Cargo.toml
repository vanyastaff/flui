[package]
name = "flui-view"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "View traits and abstractions for FLUI framework"
repository.workspace = true
keywords = ["ui", "view", "widget", "flui", "framework"]
categories = ["gui"]

[dependencies]
flui-foundation = { path = "../flui-foundation" }
flui-macros = { workspace = true }
flui-tree = { path = "../flui-tree" }
flui-types = { path = "../flui-types" }
flui-rendering = { path = "../flui-rendering" }
# Concrete render-object catalog (moved out of flui-rendering per ADR-0008).
flui-objects = { path = "../flui-objects" }

# Core dependencies
parking_lot.workspace = true
slab = "0.4"
thiserror.workspace = true
tracing.workspace = true

# Trait utilities
downcast-rs = "2.0"
dyn-clone = "1.0"

# Plan §U14: `ReconcileEventCollector` (gated to `test-utils` feature
# or `cfg(test)`) needs `tracing_subscriber::Layer` and the `registry`
# extension trait. Optional + gated so production builds don't pull
# it in.
tracing-subscriber = { workspace = true, optional = true }

[dev-dependencies]
criterion = { workspace = true }
# Same crate; dev-deps must redeclare so unit tests + integration
# tests under `#[cfg(test)]` (without the `test-utils` feature flag
# enabled at the integration boundary) still see it. Cargo merges
# both declarations; no duplication in the lockfile.
tracing-subscriber = { workspace = true }
# Plan §U17/§U19 follow-up: serialize tests that touch the process-
# wide GlobalKey REGISTRY singleton installed via
# `test_only_set_global_key_registry`. Without `#[serial]` gating,
# parallel cargo test runs race the install → tests resolve through
# each other's trees and fail non-deterministically.
serial_test = "3"
# Phase 3 §U23 (`derive_bon_stack` US4 AS2): exercises the
# `#[derive(StatelessView, ::bon::Builder)]` attribute stack
# (the catalog's most-common future authoring pattern). The
# workspace already pins `bon = "3.8"`; we pull it in only at the
# `flui-view` dev boundary so non-test builds do not link it.
bon = { workspace = true }
# Phase 3 §U34 (SC-014 column! 17-children compile-fail): trybuild
# drives the `tests/ui/` compile-fail corpus. Declared directly
# rather than via workspace deps — the workspace's `Cargo.toml`
# does not pin trybuild yet, and this is currently the only
# consumer. Pattern mirrors `crates/flui-types/Cargo.toml:35`.
trybuild = "1.0"

[features]
default = []
# Enable test utilities like MockBuildContext + the
# `ReconcileEventCollector` Layer fixture (plan §U14). Downstream
# test crates flip this to install the collector. Pulls in the
# optional `tracing-subscriber` dep at build time.
test-utils = ["dep:tracing-subscriber"]

# The `legacy-downcast` feature flag was retired in Phase 3 §U27
# (FR-021): the pre-FR-021 inline `downcast_ref::<V>()` body inside
# `ElementCore::update_view` is gone — `dispatch_view_update`
# (TypeId-keyed `Box::downcast::<V>`) is the only path now.

# cargo-shear: suppress false positive for the trybuild compile-fail test input.
# `tests/ui/column_17_compile_error.rs` is driven by `trybuild_ui.rs` via
# trybuild; it is not directly `mod`-ed so shear cannot see the reference.
[package.metadata.cargo-shear]
ignored-paths = ["tests/ui/*.rs"]

[[bench]]
name = "s1_key_storage"
harness = false

[[bench]]
name = "s2_static_path"
harness = false

[[bench]]
name = "sc012_global_key_reparent"
harness = false
