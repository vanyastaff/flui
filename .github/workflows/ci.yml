name: CI

# Mirrors the Cycle 5 per-wave verification gate (build, clippy `-D warnings`,
# per-crate lib tests, port-check.sh) on every PR + push to main. Patterns
# borrowed from linebender/xilem (gated `checks` job, Taplo + Typos + Swatinem
# cache + taiki-e/install-action for pinned tool versions) and tokio (gated
# basics → matrix tests; nextest as primary runner).

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

# Cancel in-flight runs when a new commit lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  # Strict workspace-wide; matches the per-wave gate.
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings
  # CI builds are clean every run; no incremental artifacts to preserve.
  CARGO_INCREMENTAL: 0

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # checks — fast source gate. fmt + port-check + typos + Taplo. No compile.
  # Every downstream job (clippy, test, doc, bench-compile) depends on this, so
  # a malformed PR fails in seconds before any workspace build starts.
  # Ubuntu only — pure source analysis. clippy lives in its own parallel job.
  # ─────────────────────────────────────────────────────────────────────────
  checks:
    name: checks (fmt, port-check, typos, taplo)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable + rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install CI tools (typos, taplo, ripgrep)
        uses: taiki-e/install-action@v2
        with:
          # Pin versions — unpinned tools surface unrelated breakage on
          # release day. Bump deliberately. `ripgrep` is required by
          # scripts/port-check.sh (the 7 institutional refusal triggers
          # all run through `rg`).
          tool: typos-cli@1.28,taplo-cli@0.10,ripgrep@14

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: taplo fmt --check
        run: taplo fmt --check

      - name: typos
        run: typos

      - name: scripts/port-check.sh (7 institutional refusal triggers)
        run: bash scripts/port-check.sh -v

  # ─────────────────────────────────────────────────────────────────────────
  # clippy — workspace lint with -D warnings. Split out of `checks` so it runs
  # in PARALLEL with test/doc/bench-compile instead of gating them: clippy
  # compiles the whole workspace (minutes); the rest of `checks` is seconds.
  # Gated on `checks` so a malformed PR fails cheap before this build starts.
  # ─────────────────────────────────────────────────────────────────────────
  clippy:
    name: clippy
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name != 'merge_group' }}

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Compile (not run) the feature-gated test module so the IR-purity witness
      # (`_DRAW_SEGMENT_IS_CLONE` / `DrawSegment: Clone`) and the deterministic-replay
      # tests are machine-checked in CI even though they require a GPU to execute.
      # A future field that introduces a non-Clone GPU handle would fail here.
      # `--tests` ensures the `#[cfg(all(test, feature = "enable-wgpu-tests"))]` block
      # is compiled; `--no-run` (via clippy) is implicit — clippy only type-checks.
      - name: cargo clippy flui-engine --features enable-wgpu-tests (IR-purity witness)
        run: cargo clippy -p flui-engine --all-targets --features enable-wgpu-tests -- -D warnings

  # ─────────────────────────────────────────────────────────────────────────
  # test — workspace build + nextest. Matrix: Linux + Windows.
  # Gated on `checks`. macOS deferred until the workspace AppKit code is
  # re-enabled (see CLAUDE.md: many high-level crates disabled in workspace).
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: test (${{ matrix.os }})
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        # Windows temporarily dropped from the matrix: day-to-day development
        # happens on Windows locally, so Windows regressions surface there
        # first — paying the wgpu/PDB build cost in CI is redundant for now.
        # Re-add `windows-latest` here (and in `bench-compile`) once the
        # workspace stabilizes and cross-platform CI coverage is worth the time.
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    # Complements the `Free disk space` reclaim below by shrinking the build
    # itself. DWARF is the single largest contributor to debug-target size; the
    # full workspace (~28 crates + the wgpu/glyphon/lyon/naga stack + dev-deps)
    # built with full debuginfo is what crept toward the runner's disk ceiling
    # (PRs #236/#242). `line-tables-only` drops the bulk of DWARF while keeping
    # file:line in panic backtraces, so CI failures stay diagnosable. Scoped to
    # this job's env so local `cargo test` debuginfo is unaffected.
    env:
      CARGO_PROFILE_DEV_DEBUG: line-tables-only
      CARGO_PROFILE_TEST_DEBUG: line-tables-only
    steps:
      - uses: actions/checkout@v7

      # The full-workspace debug build of all lib+test targets (incl. the wgpu/
      # glyphon/lyon/naga GPU stack and criterion/proptest/insta/trybuild dev-
      # deps, with debug-assertions + debuginfo) exhausted the ~14 GB free on the
      # default ubuntu runner — `rustc-LLVM ERROR: IO failure on output stream:
      # No space left on device` mid-build (PRs #236/#242). Reclaim ~25 GB of
      # preinstalled bloat we don't use BEFORE building. Linux-only guard so the
      # step is a no-op if Windows/macOS rejoin the matrix.
      - name: Free disk space (ubuntu)
        if: runner.os == 'Linux'
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name != 'merge_group' }}
          # Per tokio: binary caching breaks on macOS — guard for when macOS
          # joins the matrix.
          cache-bin: ${{ matrix.os != 'macos-latest' }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9

      - name: cargo build --workspace
        run: cargo build --workspace --all-targets

      # Confirm the heavy compile (disk peak) left headroom — the reclaim above
      # measures only around itself, not after the build. If this trends toward
      # 0, raise the runner or trim further targets.
      - name: Disk usage after build (ubuntu)
        if: runner.os == 'Linux'
        run: df -h /

      # `--test-threads=1` guards the documented pre-existing flui-app
      # singleton-state flake (CLAUDE.md). flui-platform tests are excluded
      # until the spawned STATUS_HEAP_CORRUPTION investigation lands a fix.
      - name: cargo nextest run (--lib, --test-threads 1)
        run: >
          cargo nextest run
          --workspace
          --exclude flui-platform
          --lib
          --no-fail-fast
          --test-threads 1

  # ─────────────────────────────────────────────────────────────────────────
  # gpu-test (PILOT) — actually RUN the `enable-wgpu-tests` readback/oracle
  # suite, which the `clippy` job above only TYPE-CHECKS. Without this, a
  # WGSL/blend-state/color-pipeline regression merges silently green — the #1
  # risk in two independent engine audits (the oracle infra exists and is
  # non-vacuous, but is operationally inert in CI today).
  #
  # windows-latest → WARP (Microsoft's software DX12 rasterizer). The readback
  # harness is authored and executed locally on DX12, so WARP is the SAME
  # backend (no Vulkan/lavapipe feature-gap or precision divergence). GitHub
  # windows runners expose no hardware GPU, so `request_adapter`
  # (force_fallback_adapter:false) returns WARP with no harness change.
  #
  # The pilot (a 5-test representative subset) PROVED the approach on CI: WARP is
  # selected on the hardware-GPU-less windows runner with no harness change, the
  # ±LSB oracle tolerances HOLD under software rasterization (blur_oracle ±3 LSB
  # passed), and the run is fast (nextest ~16 s; the ~8 min is the wgpu-stack
  # build). So this now runs the FULL `enable-wgpu-tests` suite (~440 tests).
  #
  # Still `continue-on-error` (ADVISORY) for now: this first full-suite run
  # measures real wall-time + surfaces any WARP-slow/flaky test before the gate
  # becomes merge-blocking. Once the full suite shows ~3 consecutive green runs
  # within budget, drop `continue-on-error` and add `gpu-test` to required
  # checks. Verified only by THIS workflow's run — the dev machine is hardware
  # DX12, so the WARP software path cannot be exercised locally.
  # ─────────────────────────────────────────────────────────────────────────
  gpu-test:
    name: gpu-test (wgpu readback, WARP)
    needs: checks
    runs-on: windows-latest
    # Generous headroom: ~440 readback tests on a software rasterizer, each
    # creating its own wgpu::Device, plus the cold wgpu-stack build. The first
    # full run measures the real figure; tighten or shard (nextest partition)
    # afterward if needed.
    timeout-minutes: 60
    # Advisory until the full suite is proven green + in-budget across a few
    # runs: a flaky/slow required GPU gate is worse than none. Drop this line to
    # make it merge-blocking.
    continue-on-error: true
    env:
      CARGO_PROFILE_TEST_DEBUG: line-tables-only
      # Surface the wgpu adapter selection in the log so the run confirms WARP
      # was enumerated (not a silently-missing-adapter skip).
      RUST_LOG: wgpu_hal=info,wgpu_core=info
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name != 'merge_group' }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9

      # Full enable-wgpu-tests suite. `--test-threads 1`: each test builds its own
      # wgpu::Device; WARP serializes command submission through one software
      # driver, so parallel submission can saturate it. The job-level
      # `timeout-minutes` is the hung-test backstop.
      - name: cargo nextest run (flui-engine GPU readback suite, WARP)
        run: >
          cargo nextest run
          -p flui-engine
          --features enable-wgpu-tests
          --lib
          --no-fail-fast
          --test-threads 1

  # ─────────────────────────────────────────────────────────────────────────
  # bench-compile — ensures benchmarks compile and link on both platforms.
  # `--no-run` compiles + links the bench binaries without executing them so
  # CI stays fast. Gated on `checks`. Same OS matrix as `test` so Windows
  # regressions surface here too.
  # ─────────────────────────────────────────────────────────────────────────
  bench-compile:
    name: bench-compile (${{ matrix.os }})
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        # Windows temporarily dropped — see the note in the `test` job.
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name != 'merge_group' }}
          cache-bin: ${{ matrix.os != 'macos-latest' }}

      - name: cargo bench --no-run
        run: cargo bench -p flui-rendering --no-run

  # ─────────────────────────────────────────────────────────────────────────
  # doc — RUSTDOCFLAGS=-D warnings enforces zero new doc warnings. Gated on
  # `checks`. Ubuntu only — docs are platform-agnostic.
  #
  # Hard-gate as of the workspace rustdoc cleanup sweep (feat/rustdoc-cleanup):
  # all 108 pre-existing rustdoc errors across 11 crates were resolved
  # (intra-doc-link qualifications, HTML-tag escaping of bare generics,
  # private-leak rewrites, bare-URL autolink conversions). A regression
  # here MUST block merge — the cleanup is the bar to keep.
  # ─────────────────────────────────────────────────────────────────────────
  doc:
    name: doc
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name != 'merge_group' }}

      - name: cargo doc --no-deps
        run: cargo doc --workspace --no-deps --document-private-items
