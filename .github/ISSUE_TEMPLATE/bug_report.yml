name: Bug report
description: Report reproducible incorrect behavior.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands, code, or a minimal repository that reproduces the issue.
      placeholder: |
        cargo test -p flui-rendering ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit
      description: Commit hash or branch.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, GPU/backend if relevant.
      placeholder: |
        OS:
        rustc:
        backend:
  - type: textarea
    id: logs
    attributes:
      label: Logs or traces
      description: Prefer `RUST_LOG=debug` or a minimal tracing capture.
      render: text

