[package]
name = "flui-painting-demo"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
crate-type = ["cdylib"]

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

# cargo-shear: wasm-bindgen-futures is a false positive — the dependency is
# required by the #[wasm_bindgen(start)] procedural macro expansion on the
# async `main` fn (the macro emits wasm_bindgen_futures::spawn_local internally).
# shear cannot see through attribute-macro token output.
[package.metadata.cargo-shear]
ignored = ["wasm-bindgen-futures"]

[dependencies]
wasm-bindgen = "0.2.109"
# Required by #[wasm_bindgen(start)] on an async fn — the macro expands to
# wasm_bindgen_futures::spawn_local internally.
wasm-bindgen-futures = "0.4.49"
web-sys = { version = "0.3.86", features = [
    "Window",
    "Document",
    "HtmlCanvasElement",
    "Element",
    "console",
] }
console_error_panic_hook = "0.1"
raw-window-handle = "0.6"
wgpu = { workspace = true, features = ["webgpu", "wgsl"] }
flui-engine = { path = "../../crates/flui-engine", features = ["wgpu-backend", "webgpu"] }
flui-types = { path = "../../crates/flui-types" }
