# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
#
# Run: cargo deny check
# Or:  cargo deny check advisories
#      cargo deny check bans
#      cargo deny check licenses
#      cargo deny check sources
#
# Schema: cargo-deny 0.19 (updated from 0.16):
#   - bans.deny entries now use `crate` key, not `name`.
#   - [advisories] no longer accepts `vulnerability` / severity keys: in
#     cargo-deny 0.19 all vulnerability advisories are ALWAYS hard errors
#     (not configurable). The gate did NOT weaken — vulnerabilities are
#     strictly enforced by the tool itself.
#   - `unmaintained` and `unsound` take a scope value ("all" | "workspace"
#     | "external") rather than a severity string.

# ═══════════════════════════════════════════════════════════════════════════════
# Advisories - Security vulnerability database checks
# ═══════════════════════════════════════════════════════════════════════════════
[advisories]
# Warn on yanked crates (scope: all published versions)
yanked = "warn"
# Flag unmaintained crates across the full dependency graph
unmaintained = "all"
# Flag crates with known unsound APIs
unsound = "all"
# Ignore specific advisories
ignore = [
    # RUSTSEC-2025-0057: fxhash is unmaintained (repo stale, owner inactive).
    # Source: fxhash v0.2.1 ← wgsl_bindgen v0.22.2 (BUILD-DEP ONLY — never
    # compiled into the binary or public API).  Introduced in PR wgsl-bindgen
    # pilot (P1); no upgrade is available upstream.  The only risk is build-time
    # hash non-determinism, which does not affect the compiled artefact.
    { id = "RUSTSEC-2025-0057" },

    # RUSTSEC-2026-0186: memmap2 ≤0.9.10 passes an unchecked pointer offset to
    # madvise/msync syscalls.  PRE-EXISTING on main (pinned by cosmic-text 0.18.2
    # → fontdb → memmap2 0.9.10; cosmic-text caps the version).
    # Fixed in memmap2 0.9.11 — unblock by updating cosmic-text when 0.18.3+.
    # The pointer is NOT dereferenced; exploitability requires our code to pass
    # an out-of-bounds range to advise_range/flush_range, which we do not do.
    { id = "RUSTSEC-2026-0186" },
]

# ═══════════════════════════════════════════════════════════════════════════════
# Licenses - Allowed open source licenses
# ═══════════════════════════════════════════════════════════════════════════════
[licenses]
# Confidence threshold for license detection
confidence-threshold = 0.8
# List of allowed licenses (SPDX identifiers)
allow = [
    # Permissive licenses
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",                        # Boost
    "ISC",
    "Zlib",
    "0BSD",

    # Public domain
    "Unlicense",
    "CC0-1.0",

    # Copyleft (weak) - OK for libraries
    "MPL-2.0",

    # Unicode/Font licenses
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OFL-1.1",          # Open Font License
]
# Copyleft licenses that require source disclosure are not in the allow list
# above, so they are implicitly denied (cargo-deny 0.19 removed the `deny` key;
# unlisted licenses are rejected by default when `allow` is set).

# Clarifications for crates with non-standard license files
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
crate = "encoding_rs"
expression = "(Apache-2.0 OR MIT) AND BSD-3-Clause"
license-files = [{ path = "COPYRIGHT", hash = 0x39f8ad31 }]

[[licenses.clarify]]
crate = "webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

# ═══════════════════════════════════════════════════════════════════════════════
# Bans - Crate restrictions and duplicate detection
# ═══════════════════════════════════════════════════════════════════════════════
[bans]
# Warn on multiple versions of the same crate
multiple-versions = "warn"
# Allow wildcard dependencies (common in workspace)
wildcards = "allow"
# Highlight all duplicates in output
highlight = "all"
# Workspace crate handling
workspace-default-features = "allow"
external-default-features = "allow"

# Deny specific crates (unmaintained, insecure, or problematic)
deny = [
    # Unmaintained crates with better alternatives
    { crate = "atty" }, # Use is-terminal

    # Security concerns
    { crate = "openssl" },    # Prefer rustls
    { crate = "native-tls" }, # Prefer rustls
]

# Skip duplicate checks for specific crates (if unavoidable)
skip = []

# Tree-skip: skip checking duplicates in specific dependency trees
skip-tree = []

# ═══════════════════════════════════════════════════════════════════════════════
# Sources - Allowed crate registries and git sources
# ═══════════════════════════════════════════════════════════════════════════════
[sources]
# Deny crates from unknown registries
unknown-registry = "deny"
# Warn on git dependencies (prefer published crates)
unknown-git = "warn"
# Allowed registries
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Allowed git sources (add trusted repos here if needed)
allow-git = []

# Organization-level git allowances
[sources.allow-org]
# github = ["anthropics", "ArroyoSystems"]
