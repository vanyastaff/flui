# Cargo configuration for FLUI workspace
# https://doc.rust-lang.org/cargo/reference/config.html

# ═══════════════════════════════════════════════════════════════════════════════
# Build settings
# ═══════════════════════════════════════════════════════════════════════════════
[build]
# Use all available CPU cores
jobs = 8

# Override ~/.cargo/config.toml `rustc-wrapper = "sccache"`. An empty string is the
# only in-tree way to unset a global wrapper; RUSTC_WRAPPER="" does not work.
# sccache-wrapped rustc crashes with STATUS_ACCESS_VIOLATION on cosmic-text (Windows).
rustc-wrapper = ""

# ═══════════════════════════════════════════════════════════════════════════════
# Linker configuration - faster linking
# ═══════════════════════════════════════════════════════════════════════════════

# Windows - use native MSVC linker (faster than GNU ld)
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "link-arg=/DEBUG:NONE"] # Faster release builds

# Linux - use mold linker if available (10x faster than ld)
# NOTE: Disabled - mold not available in this environment
# [target.x86_64-unknown-linux-gnu]
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# macOS - use lld linker
[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# ═══════════════════════════════════════════════════════════════════════════════
# Android NDK targets
# ═══════════════════════════════════════════════════════════════════════════════
[target.aarch64-linux-android]
# linker = "path/to/ndk/toolchains/llvm/prebuilt/windows-x86_64/bin/aarch64-linux-android21-clang"

[target.armv7-linux-androideabi]
# linker = "path/to/ndk/toolchains/llvm/prebuilt/windows-x86_64/bin/armv7a-linux-androideabi21-clang"

[target.x86_64-linux-android]
# linker = "path/to/ndk/toolchains/llvm/prebuilt/windows-x86_64/bin/x86_64-linux-android21-clang"

# ═══════════════════════════════════════════════════════════════════════════════
# WASM target
# ═══════════════════════════════════════════════════════════════════════════════
# Atomics/bulk-memory only needed for multi-threaded WASM (SharedArrayBuffer).
# Uncomment when enabling Web Workers with shared memory.
# [target.wasm32-unknown-unknown]
# rustflags = ["-C", "target-feature=+atomics,+bulk-memory,+mutable-globals"]

# ═══════════════════════════════════════════════════════════════════════════════
# Profile-specific rustflags
# ═══════════════════════════════════════════════════════════════════════════════
[profile.dev]
# Split debug info for faster incremental builds (Linux/macOS)
# split-debuginfo = "unpacked"

[profile.release]
# LTO for release builds (better optimization, slower compile)
# lto = "thin"

# ═══════════════════════════════════════════════════════════════════════════════
# Registry settings
# ═══════════════════════════════════════════════════════════════════════════════
[registries.crates-io]
protocol = "sparse" # Faster index updates

# ═══════════════════════════════════════════════════════════════════════════════
# Network settings
# ═══════════════════════════════════════════════════════════════════════════════
[net]
retry = 3
git-fetch-with-cli = false

# ═══════════════════════════════════════════════════════════════════════════════
# Environment variables for build scripts
# ═══════════════════════════════════════════════════════════════════════════════
[env]
# Disable incremental compilation workspace-wide.
#
# `sccache` (the configured `rustc-wrapper`) is fundamentally incompatible with
# incremental builds — it caches whole crate-unit outputs and cannot cache the
# per-CGU incremental artifacts, so it disables incremental anyway. On Windows the
# `sccache` + incremental combination additionally crashes `rustc` with
# STATUS_ACCESS_VIOLATION (0xc0000005) when building the heavier test binaries
# (e.g. `flui-interaction --test`), blocking the local test gate. Pinning
# `CARGO_INCREMENTAL=0` matches CI (which already sets it) and makes every local
# build reliable under `sccache`. Not `force`d — a contributor without `sccache`
# can still opt back in with `CARGO_INCREMENTAL=1 cargo ...` for faster rebuilds.
CARGO_INCREMENTAL = "0"

# Faster shader compilation for wgpu
# WGPU_BACKEND = "vulkan"  # or "dx12" on Windows
